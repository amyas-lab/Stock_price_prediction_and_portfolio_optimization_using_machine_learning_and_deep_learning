name: Keep HF Spaces Alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping API health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://amyas0107-investnature-api.hf.space/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: API returned $STATUS"
          fi
